name: 'Bot Check Action'
description: 'A GitHub Action that verifies whether an issue or PR was created by a bot. Supports automatic issue deletion and tagging.'
author: 'dohyeon5626'

inputs:
  comment-account-token:
    description: 'Token for the account that posts comments. If not set, personal-access-token is used instead.'
    required: false
    default: ${{ github.token }}
  personal-access-token:
    description: 'Personal access token used for calling the verification API'
    required: true
  auto-close:
    description: 'Whether to automatically close the issue or PR if created by a bot'
    required: false
    default: 'false'
  tag:
    description: 'Tag to apply to issues or PRs created by a bot'
    required: false
    default: ''
  verification-timeout:
    description: 'Verification code expiration time in minutes'
    required: false
    default: '5'
  trusted-permission:
    description: 'Minimum permission level to skip verification. One of: read, write, admin. Leave empty to require verification from everyone.'
    required: false
    default: ''
  allowed-users:
    description: 'Comma-separated list of usernames to skip verification (e.g. alice,bob).'
    required: false
    default: ''
  first-time-only:
    description: 'If true, only first-time contributors are required to verify. Returning contributors are skipped.'
    required: false
    default: 'false'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'check-circle'
  color: 'gray-dark'
